spring:
  datasource:
    url: jdbc:h2:mem:tondo_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=USER
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  cache:
    type: none
  data:
    redis:
      host: localhost
      port: 6379
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

tondo:
  mq:
    notification-enabled: false

minio:
  enabled: false

jwt:
  secret: test-secret-key-for-unit-tests-must-be-long-enough-256bits
  expiration: 604800000

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  level:
    root: WARN
